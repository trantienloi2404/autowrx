# AutoWRX nginx site template.
#
# HOW TO USE:
#   1. Copy this file to /etc/nginx/sites-available/<your-domain>
#   2. Replace YOUR-DOMAIN.COM with your real domain (2 places)
#   3. Replace BACKEND_PORT (3200) if your backend listens elsewhere
#   4. If you're NOT using the VS Code / Coder integration, delete the
#      "=== Coder integration ===" block (locations /bin/, /api/, /derp, /coder/)
#      and skip steps 6-8 below.
#   5. symlink and test:
#        sudo ln -s /etc/nginx/sites-available/<your-domain> /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#   6. Get TLS certificate:
#        sudo certbot --nginx -d <your-domain>
#   7. Update backend site-config:  CODER_URL = http://localhost:7080
#      (keep it internal — the frontend builds same-origin /coder/... URLs)
#   8. Point Coder at your public URL. The compose file reads $CODER_ACCESS_URL
#      from the environment (default: http://localhost:7080). Create a .env
#      next to coder-docker-compose.yml:
#        echo 'CODER_ACCESS_URL=https://<your-domain>/coder' > instance-setup/coder/.env
#      then: docker compose -f coder-docker-compose.yml up -d
#      Any workspace created *before* this change must be restarted
#      (docker restart coder-user-...), because the Coder agent's download
#      URL is baked into the container entrypoint at build time.

server {
    server_name YOUR-DOMAIN.COM;

    # Allow larger uploads (media, prototype assets, etc.)
    client_max_body_size 50M;

    # === Coder integration ===
    # The AutoWRX frontend iframes a same-origin /coder/... URL; Coder's built-in
    # agent init script also references root paths (/bin/, /api/, /derp) that
    # must reach the Coder server directly, not the AutoWRX backend.
    # Delete this whole block if you aren't running Coder.

    # Agent binary download at workspace startup.
    location /bin/ {
        proxy_pass http://127.0.0.1:7080;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Agent <-> Coder API + WebSockets (workspace RPC, logs, build events).
    location /api/ {
        proxy_pass http://127.0.0.1:7080;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Tailnet DERP relay (peer-to-peer fallback used by the Coder agent).
    location /derp {
        proxy_pass http://127.0.0.1:7080;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Coder UI + workspace app proxy (code-server iframe).
    # The trailing slash on proxy_pass strips the "/coder" prefix before forwarding,
    # so /coder/@user/... -> /@user/... on the Coder server.
    location /coder/ {
        proxy_pass http://127.0.0.1:7080/;

        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Rewrite Coder-generated redirect Location headers so the browser stays
        # under /coder/ instead of being bounced to the AutoWRX root.
        # (Coder emits absolute URLs derived from CODER_ACCESS_URL; when that is
        #  set to https://<domain>/coder, it still emits root-relative redirects.)
        proxy_redirect http://localhost:7080/             /coder/;
        proxy_redirect http://127.0.0.1:7080/             /coder/;
        proxy_redirect ~^http://coder:7080/(.*)$          /coder/$1;
        proxy_redirect https://YOUR-DOMAIN.COM/coder/     /coder/;
        proxy_redirect https://YOUR-DOMAIN.COM/           /coder/;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    # === end Coder integration ===

    # AutoWRX backend (Express). Serves the built frontend from /static/frontend-dist
    # when NODE_ENV=production. WebSocket upgrade is needed for socket.io and the
    # backend's own Coder WS proxy at /v2/system/coder/*.
    location / {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_redirect off;
        proxy_pass http://localhost:3200;   # change to your backend PORT
    }

    add_header X-Frame-Options              "SAMEORIGIN"               always;
    add_header X-Content-Type-Options       "nosniff"                  always;
    add_header X-XSS-Protection             "1; mode=block"            always;
    add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none"              always;

    # TLS config is appended here by `certbot --nginx -d YOUR-DOMAIN.COM`.
    listen 80;
}
